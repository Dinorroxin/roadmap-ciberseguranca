<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <div class="roadmap-title">
        <h1>Roadmap de Cibersegurança</h1>
    </div>

    <section class="filters">

    <div id="filter-price" class="group-filters">
        <h3>Preço</h3>
        <button class="btn-filter" data-filter-price="free">Gratuito</button>
        <button class="btn-filter" data-filter-price="paid">Pago</button>
    </div>

    <div id="filter-type" class="group-filters">
        <h3>Tipo</h3>
        <button class="btn-filter" data-filter-type="course">Curso</button>
        <button class="btn-filter" data-filter-type="certification">Certificação</button>
        <button class="btn-filter" data-filter-type="practice">Prática</button>
        <button class="btn-filter" data-filter-type="tool">Ferramenta</button>
        <button class="btn-filter" data-filter-type="reading">Leitura</button>
    </div>

    </section>

    <section id="roadmap-container">

    </section>

</body>
</html>
